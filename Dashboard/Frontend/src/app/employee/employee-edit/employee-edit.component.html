<ui5-dialog [open]="isOpen" header-text="Edit Employee Information" state="Information">
  <ui5-busy-indicator [active]="formloading" [delay]="100">
    <div class="container p-3">
      <!-- Active Switch -->
      <div class="d-flex align-items-center mb-4">
        <ui5-label show-colon class="me-2">Active</ui5-label>
        <ui5-switch
          design="Graphical"
          [checked]="isActive"
          (change)="toggleActive($event)"
        ></ui5-switch>
      </div>

      <!-- Two Column Layout -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4 bg-slate-100 rounded-md" >
        <!-- First Name -->
        <div >
          <ui5-label show-colon required>First Name</ui5-label>
          <ui5-input
            placeholder="Enter first name"
            class="w-100"
            [(ngModel)]="employee.first_name"
            required
          ></ui5-input>
        </div>

        <!-- Last Name -->
        <div >
          <ui5-label show-colon required>Last Name</ui5-label>
          <ui5-input
            placeholder="Enter last name"
            class="w-100"
            [(ngModel)]="employee.last_name"
            required
          ></ui5-input>
        </div>

        <!-- Email -->
        <div >
          <ui5-label show-colon required>Email</ui5-label>
          <ui5-input
            type="Email"
            placeholder="Enter email"
            class="w-100"
            [(ngModel)]="employee.email"
            required
          ></ui5-input>
        </div>

        <!-- Phone -->
        <div >
          <ui5-label show-colon required>Phone</ui5-label>
          <ui5-input
            placeholder="Enter phone number"
            class="w-100"
            [(ngModel)]="employee.phone"
            required
          ></ui5-input>
        </div>

        <!-- Department -->
        <div class="col-md-6">
          <ui5-label show-colon required>Department</ui5-label>
          <ui5-select
            class="w-100"
            [(ngModel)]="employee.department"
            required
          >
            <ui5-option *ngFor="let dept of departmentList" [value]="dept">
              {{ dept }}
            </ui5-option>
          </ui5-select>
        </div>

        <!-- Designation -->
        <div >
          <ui5-label show-colon required>Designation</ui5-label>
          <ui5-select
            class="w-100"
            [(ngModel)]="employee.designation"
            required
          >
            <ui5-option *ngFor="let desig of designationList" [value]="desig">
              {{ desig }}
            </ui5-option>
          </ui5-select>
        </div>

        <!-- Date of Birth -->
        <div >
          <ui5-label show-colon required>Date of Birth</ui5-label>
          <ui5-date-picker
            class="w-100"
            format-pattern="yyyy-MM-dd"
            [(ngModel)]="employee.date_of_birth"
            required
          ></ui5-date-picker>
        </div>

        <!-- Joining Date -->
        <div class="col-md-6">
          <ui5-label show-colon required>Joining Date</ui5-label>
          <ui5-date-picker
            class="w-100"
            format-pattern="yyyy-MM-dd"
            [(ngModel)]="employee.joining_date"
            required
          ></ui5-date-picker>
        </div>

        <!-- Address Full Width -->
        <div >
          <ui5-label show-colon required>Address</ui5-label>
          <ui5-textarea
            placeholder="Enter address"
            class="w-100"
            [(ngModel)]="employee.address"
            required
          ></ui5-textarea>
        </div>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="text-danger mt-3">
        {{ errorMessage }}
      </div>
    </div>
  </ui5-busy-indicator>

  <!-- Footer Buttons -->
  <div slot="footer" class="d-flex justify-content-end w-100 gap-2 p-2">
    <ui5-button design="Emphasized" (click)="updateData()" [disabled]="formloading">
      Update
    </ui5-button>
    <ui5-button design="Default" (click)="closeDialog()">Cancel</ui5-button>
  </div>
</ui5-dialog>
