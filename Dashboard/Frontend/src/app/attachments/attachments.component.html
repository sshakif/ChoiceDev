<!-- Header Area -->
<div class="flex justify-between items-center bg-white p-4 shadow-sm">
  <label class="text-base font-semibold"
    >Attachments ({{ attachments.length }})</label
  >
  <div class="flex gap-2 items-center">
    <ui5-button
      class="text-gray-500"
      tooltip="Upload files"
      [disabled]="isImageAlreadyUploaded()"
      (click)="onUploadClick()"
    >
      Upload
    </ui5-button>

    <ui5-button
      class="text-gray-500"
      design="Transparent"
      tooltip="Download selected files"
      (click)="downloadSelected()"
    >
      Download
    </ui5-button>
  </div>
</div>

<!-- Hidden File Input -->
<input type="file" hidden #fileInput (change)="onFilesSelected($event)" />

<!-- File List -->
<ui5-list mode="MultiSelect" id="fileList">
  <ui5-li-custom
    *ngFor="let file of attachments; let i = index"
    [selected]="file.selected"
    (click)="toggleSelection(i)"
  >
    <div class="flex items-center justify-between w-full">
      <div class="flex items-center gap-2">
        <!-- Image preview -->
        <img
          *ngIf="isImage(file.file)"
          [src]="file.previewUrl"
          alt="preview"
          style="
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
          "
        />

        <!-- Icon if not image -->
        <ui5-icon *ngIf="!isImage(file.file)" name="paperclip"></ui5-icon>

        <span>{{ file.file.name }}</span>
      </div>

      <!-- Delete -->
      <ui5-button
        icon="delete"
        design="Transparent"
        tooltip="Delete file"
        (click)="removeFile(i); $event.stopPropagation()"
      ></ui5-button>
    </div>
  </ui5-li-custom>
</ui5-list>

<!-- No Files Image -->
<div *ngIf="attachments.length === 0" class="p-4 text-center">
  <div class="w-full flex flex-wrap justify-start gap-4 p-4">
    <div class="text-center text-gray-500 w-full">
      <img
        src="../../assets/img/Uploder.png"
        alt="No files"
        class="mx-auto w-32 mb-4"
      />
      <div class="text-lg font-medium">No files found</div>
      <div class="text-sm">Drop files to upload, or use the Upload button.</div>
    </div>
  </div>
</div>
