<div class="attachment-wrapper p-4 border rounded shadow-sm max-w-md mx-auto">
  <!-- Upload Button -->
  <button class="btn-upload px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
    (click)="onUploadClick()"
  >
    Upload
  </button>

  <!-- Hidden File Input -->
  <input type="file" hidden #fileInput (change)="onFilesSelected($event)" />

  <!-- Media List -->
  <ul class="media-list mt-4 space-y-3">
    <li *ngFor="let media of mediaItems; let i = index" class="media-item flex items-center gap-4 border p-2 rounded">
      <div class="media-preview w-12 h-12 flex-shrink-0">
        <img
          *ngIf="media.mime_type.startsWith('image/')"
          [src]="media.original_url"
          alt="{{ media.name }}"
          class="w-full h-full object-cover rounded"
        />
        <ui5-icon
          *ngIf="!media.mime_type.startsWith('image/')"
          name="document"
          style="font-size: 32px; color: gray;"
        ></ui5-icon>
      </div>

      <div class="media-info flex-1">
        <span class="block font-semibold truncate" title="{{ media.name }}">{{ media.name }}</span>
      </div>

      <div class="media-actions flex gap-2">
        <button
          class="btn-download px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700"
          (click)="downloadMedia(media)"
          title="Download"
        >
          Download
        </button>
        <button
          class="btn-delete px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700"
          (click)="deleteMedia(media.id, i)"
          title="Delete"
        >
          Delete
        </button>
      </div>
    </li>
  </ul>

  <!-- Empty state -->
  <div *ngIf="mediaItems.length === 0" class="text-center text-gray-500 mt-8">
    <img src="../../assets/img/Uploder.png" alt="No files" class="mx-auto w-24 mb-4" />
    <div class="text-lg font-medium">No files found</div>
    <div class="text-sm">Drop files to upload, or use the Upload button.</div>
  </div>
</div>
