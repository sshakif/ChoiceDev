<div style="height: 100vh">
  <react-analytical-table
    [headerTitle]="Title"
    [insertTitle]="'New'"
    [button1Text]="'ALL'"
    [button2Text]="'Active'"
    [button3Text]="'Inactive'"
    [apiUrl]="'ServicePages?'"
    [alternateRowColors]="true"
    [isInsertData]="true"
    [isSearchFilter]="true"
    [isFilterable]="true"
    [isOdata]="true"
    [model]="ServicePages"
    [isGroupable]="false"
    [isSortable]="true"
    [isTableTree]="false"
    [isInfiniteScroll]="true"
    [infiniteScrollNumber]="10"
    [minRowsNumber]="15"
    [headerHeight]="30"
    [rowHeight]="30"
    [selectionMode]="'None'"
    [emptyDataText]="'No Data Found'"
    [tableColumn]="tableColum()"
    [selectionMode]="'Single'"
    [rowSelectionBehavior]="'RowOnly'"
    [refreshTrigger]="refreshTable"
    (isInsertDataChange)="handleInsertData($event)"
  ></react-analytical-table>
</div>
<app-add-service
  [isOpen]="isInsert"
  (close)="closeAddModal()"
  [refreshTrigger]="refreshTable"
></app-add-service>

<app-edit-service
  *ngIf="isEdit"
  [servicePageId]="selectedServicePageId"
  [servicePageData]="selectedServicePageData"
  [isOpen]="isEdit"
  (close)="closeEditServicePageModal()"
  (refreshTable)="refreshTable.emit()"
  ></app-edit-service>


<ui5-dialog [open]="isDeleteOpen" header-text="Warning" state="Critical">
  <p *ngIf="!isDeleteLoading">Are you sure you want to delete this data?</p>
  <div *ngIf="isDeleteLoading">
    <p>Deleting please wait ...</p>
  </div>

  <div
    slot="footer"
    style="
      display: flex;
      align-items: center;
      justify-content: end;
      width: 100%;
      box-sizing: border-box;
    "
  >
    <ui5-button
      (click)="deleteItemConfirm()"
      design="Emphasized"
      style="min-width: 4rem"
      [disabled]="isDeleteLoading"
    >
      Delete
    </ui5-button>
    <ui5-button
      (click)="isDeleteOpen = false"
      style="margin: 0 0 0 0.5rem; min-width: 4rem"
      [disabled]="isDeleteLoading"
    >
      Close
    </ui5-button>
  </div>
</ui5-dialog>

<app-service-details
  [isOpen]="isDetails"
  [servicePageId]="selectedServicePageId"
  [servicePageData]="selectedServicePageData"
  (close)="closeServiceDetailsModal()"
></app-service-details>

<app-toast-message
  [IsOpenToastAlert]="IsOpenToastAlert"
  [ToastType]="ToastType"
></app-toast-message>
