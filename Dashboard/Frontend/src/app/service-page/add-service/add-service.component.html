<ui5-dialog [open]="isOpen" header-text="New" class="w-50" state="Information">
  <ui5-tabcontainer [collapsed]="isTabCollapsed">
    <ui5-tab text="Info" selected>
      <ui5-bar slot="header" design="Header">
        <ui5-title level="H5" slot="startContent">New</ui5-title>
        <ui5-button
          class="dialogCloser"
          design="Transparent"
          id="closeDialogButton"
          slot="endContent"
          (click)="closeDialog()"
          icon="decline"
        ></ui5-button>
      </ui5-bar>
      <app-faq-add *ngIf="loading"></app-faq-add>

      <ui5-message-strip
        class="w-100 mt-3"
        design="Critical"
        *ngIf="errorMessage"
      >
        <ui5-icon name="alert" slot="icon"></ui5-icon> {{ errorMessage }}
      </ui5-message-strip>
      <section>
        <div>
          <div>
            <div class="d-flex align-items-center">
              <ui5-label show-colon>Active</ui5-label>
              <ui5-switch
                accessible-name="graphical"
                design="Graphical"
                [checked]="isActive"
                (change)="toggleAction($event)"
              ></ui5-switch>
            </div>
            <!-- Title Field -->
            <div>
              <ui5-label
                style="margin-right: 10px"
                show-colon
                required
                class="block text-sm font-medium text-gray-700"
              >
                Title
              </ui5-label>
              <ui5-input
                class="h-[40px] w-100"
                [(ngModel)]="Service.title"
                placeholder="Enter your Title"
                required
              ></ui5-input>
            </div>
            <!-- Short Description Field -->
            <div>
              <ui5-label
                show-colon
                required
                class="block text-sm font-medium text-gray-700"
              >
                Short Description
              </ui5-label>
              <ui5-textarea
                [(ngModel)]="Service.short_description"
                placeholder="Enter your Short Description"
                required
              ></ui5-textarea>
            </div>
            <!-- Long Description Field -->
            <div>
              <ui5-label
                show-colon
                required
                class="block text-sm font-medium text-gray-700"
              >
                Long Description
              </ui5-label>
              <ui5-textarea
                class="h-[150px] w-full"
                [(ngModel)]="Service.long_description"
                placeholder="Enter your Long Description"
                required
              ></ui5-textarea>
            </div>
          </div>
        </div>
      </section>
    </ui5-tab>
    <!-- Attachments File Uploder Start  -->
    <ui5-tab text="Attachments">
      <!-- Header Area -->
      <div class="flex justify-between items-center bg-white p-4 shadow-sm">
        <label class="text-base font-semibold"
          >Attachments ({{ attachments.length }})</label
        >
        <div class="flex gap-2 items-center">
          <ui5-button
            class="text-gray-500"
            tooltip="Upload files"
            (click)="fileInput.click()"
            >Upload</ui5-button
          >
          <ui5-button
            class="text-gray-500"
            design="Transparent"
            tooltip="Download selected files"
            (click)="downloadSelected()"
            >Download</ui5-button
          >
        </div>
      </div>
      <!-- Hidden File Input -->
      <input
        type="file"
        multiple
        hidden
        #fileInput
        (change)="onFilesSelected($event)"
      />
      <ui5-list mode="MultiSelect" id="fileList">
        <ui5-li-custom
          *ngFor="let file of attachments; let i = index"
          [selected]="file.selected"
          (click)="toggleSelection(i)"
        >
          <div class="flex items-center justify-between w-full">
            <div class="flex items-center gap-2">
              <!-- Image preview if image -->
              <img
                *ngIf="isImage(file.file)"
                [src]="file.previewUrl"
                alt="preview"
                style="
                  width: 40px;
                  height: 40px;
                  object-fit: cover;
                  border-radius: 4px;
                "
              />
              <!-- Icon if not image -->
              <ui5-icon *ngIf="!isImage(file.file)" name="paperclip"></ui5-icon>

              <!-- File name -->
              <span>{{ file.file.name }}</span>
            </div>

            <!-- Delete button -->
            <ui5-button
              icon="delete"
              design="Transparent"
              tooltip="Delete file"
              (click)="removeFile(i); $event.stopPropagation()"
            ></ui5-button>
          </div>
        </ui5-li-custom>
      </ui5-list>
      <!-- Attachments Image  Start -->
      <div *ngIf="attachments.length === 0" class="p-4 text-center">
        <div class="w-full flex flex-wrap justify-start gap-4 p-4">
          <div class="text-center text-gray-500 w-full">
            <img
              src="../../../assets/img/Uploder.png"
              alt="No files"
              class="mx-auto w-32 mb-4"
            />
            <div class="text-lg font-medium">No files found</div>
            <div class="text-sm">
              Drop files to upload, or use the Upload button.
            </div>
          </div>
        </div>
      </div>
      <!-- Attachments Image  End -->
    </ui5-tab>
  </ui5-tabcontainer>
  <ui5-toolbar slot="footer">
    <ui5-toolbar-button
      design="Emphasized"
      [disabled]="loading"
      (click)="insertData()"
      text="Submit"
    ></ui5-toolbar-button>
    <ui5-toolbar-button
      design="Transparent"
      text="Close"
      (click)="closeDialog()"
    ></ui5-toolbar-button>
  </ui5-toolbar>
</ui5-dialog>

<app-toast-message
  [IsOpenToastAlert]="IsOpenToastAlert"
  [ToastType]="ToastType"
></app-toast-message>
