<ui5-dialog [open]="isOpen" header-text="New" class="w-50" state="Information">
  <ui5-tabcontainer [collapsed]="isTabCollapsed">
    <ui5-tab text="Info">
      <ui5-bar slot="header" design="Header">
        <ui5-title level="H5" slot="startContent">New</ui5-title>
        <ui5-button
          class="dialogCloser"
          design="Transparent"
          id="closeDialogButton"
          slot="endContent"
          (click)="closeDialog()"
          icon="decline"
        ></ui5-button>
      </ui5-bar>
      <app-faq-add *ngIf="loading"></app-faq-add>

      <ui5-message-strip
        class="w-100 mt-3"
        design="Critical"
        *ngIf="errorMessage"
      >
        <ui5-icon name="alert" slot="icon"></ui5-icon> {{ errorMessage }}
      </ui5-message-strip>
      <section>
        <div>
          <div>
            <div class="d-flex align-items-center">
              <ui5-label show-colon>Active</ui5-label>
              <ui5-switch
                accessible-name="graphical"
                design="Graphical"
                [checked]="isActive"
                (change)="toggleAction($event)"
              ></ui5-switch>
            </div>

            <!-- Title Field -->
            <div>
              <ui5-label
                style="margin-right: 10px"
                show-colon
                required
                class="block text-sm font-medium text-gray-700"
              >
                Title
              </ui5-label>
              <ui5-input
                class="h-[40px] w-100"
                [(ngModel)]="Service.title"
                placeholder="Enter your Title"
                required
              ></ui5-input>
            </div>

            <!-- Short Description Field -->
            <div>
              <ui5-label
                show-colon
                required
                class="block text-sm font-medium text-gray-700"
              >
                Short Description
              </ui5-label>
              <ui5-textarea
                [(ngModel)]="Service.short_description"
                placeholder="Enter your Short Description"
                required
              ></ui5-textarea>
            </div>

            <!-- Long Description Field -->
            <div>
              <ui5-label
                show-colon
                required
                class="block text-sm font-medium text-gray-700"
              >
                Long Description
              </ui5-label>
              <ui5-textarea
                class="h-[150px] w-full"
                [(ngModel)]="Service.long_description"
                placeholder="Enter your Long Description"
                required
              ></ui5-textarea>
            </div>
          </div>
        </div>
      </section>
    </ui5-tab>
    <ui5-tab text="Attachments" selected>
      <ui5-tabcontainer [collapsed]="isTabCollapsed">
        <!-- Info Tab (Left side) -->
        <ui5-tab text="Attachments()">
          <div class="w-full flex flex-wrap justify-start gap-4 p-4">
            <div
              *ngIf="uploadedFiles.length === 0"
              class="text-center text-gray-500 w-full"
            >
              <img
                src="../../../assets/img/Uploder.png"
                alt="No files"
                class="mx-auto w-32 mb-4"
              />
              <div class="text-lg font-medium">No files found</div>
              <div class="text-sm">
                Drop files to upload, or use the Upload button.
              </div>
            </div>

            <div *ngFor="let file of uploadedFiles" class="w-40">
              <img
                *ngIf="file.type.startsWith('image')"
                [src]="file.preview"
                class="w-full h-auto rounded shadow"
              />
              <div class="truncate text-sm text-center mt-2">
                {{ file.name }}
              </div>
            </div>
          </div>
        </ui5-tab>
        <!-- Right Side: Uploader Tab -->

            <ui5-tab text="Uploader">
              <div class="p-4 w-1/2">
                <input
                  type="file"
                  (change)="onFileSelected($event)"
                  multiple
                  hidden
                  #fileInput
                />
                <ui5-button icon="upload" (click)="fileInput.click()"
                  >Upload Files</ui5-button
                >
              </div>
            </ui5-tab>
        <!-- Download Tab -->
        <ui5-tab text="Download">
          <div class="p-4">
            <ui5-list>
              <ui5-li *ngFor="let file of uploadedFiles">
                <ui5-checkbox [(ngModel)]="file.selected"></ui5-checkbox>
                {{ file.name }}
                <ui5-button
                  icon="download"
                  design="Transparent"
                  (click)="downloadFile(file)"
                  >Download</ui5-button
                >
              </ui5-li>
            </ui5-list>
            <ui5-button
              icon="download"
              design="Emphasized"
              (click)="downloadSelectedFiles()"
              >Download Selected</ui5-button
            >
          </div>
        </ui5-tab>
      </ui5-tabcontainer>
    </ui5-tab>
  </ui5-tabcontainer>
  <ui5-toolbar slot="footer">
    <ui5-toolbar-button
      design="Emphasized"
      [disabled]="loading"
      (click)="insertData()"
      text="Submit"
    ></ui5-toolbar-button>
    <ui5-toolbar-button
      design="Transparent"
      text="Close"
      (click)="closeDialog()"
    ></ui5-toolbar-button>
  </ui5-toolbar>
</ui5-dialog>

<app-toast-message
  [IsOpenToastAlert]="IsOpenToastAlert"
  [ToastType]="ToastType"
></app-toast-message>
