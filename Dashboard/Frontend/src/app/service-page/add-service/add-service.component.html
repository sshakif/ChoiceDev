<ui5-dialog [open]="isOpen" class="w-50" state="Information">
  <ui5-tabcontainer [collapsed]="isTabCollapsed">
    <ui5-tab text="Info" selected>
      <ui5-bar slot="header" design="Header">
        <ui5-title level="H5" slot="startContent">New</ui5-title>
        <ui5-button
          class="dialogCloser"
          design="Transparent"
          id="closeDialogButton"
          slot="endContent"
          (click)="closeDialog()"
          icon="decline"
        ></ui5-button>
      </ui5-bar>
      <app-faq-add *ngIf="loading"></app-faq-add>

      <ui5-message-strip
        class="w-100 mt-3"
        design="Critical"
        *ngIf="errorMessage"
      >
        <ui5-icon name="alert" slot="icon"></ui5-icon> {{ errorMessage }}
      </ui5-message-strip>
      <section>
        <div>
          <div>
            <div class="d-flex align-items-center">
              <ui5-label show-colon>Active</ui5-label>
              <ui5-switch
                accessible-name="graphical"
                design="Graphical"
                [checked]="isActive"
                (change)="toggleAction($event)"
              ></ui5-switch>
            </div>

            <!-- Title Field -->
            <div>
              <ui5-label
                style="margin-right: 10px"
                show-colon
                required
                class="block text-sm font-medium text-gray-700"
              >
                Title
              </ui5-label>
              <ui5-input
                class="w-100"
                [(ngModel)]="Service.title"
                placeholder="Enter your Title"
                required
              ></ui5-input>
            </div>

            <!-- Short Description Field -->
            <div>
              <ui5-label
                show-colon
                required
                class="block text-sm font-medium text-gray-700"
              >
                Short Description
              </ui5-label>
              <ui5-textarea
                [(ngModel)]="Service.short_description"
                placeholder="Enter your Short Description"
                required
              ></ui5-textarea>
            </div>

            <!-- Long Description Field -->
            <div>
              <ui5-label
                show-colon
                required
                class="block text-sm font-medium text-gray-700"
              >
                Long Description
              </ui5-label>
              <ui5-textarea
                class="h-full w-full"
                [(ngModel)]="Service.long_description"
                placeholder="Enter your Long Description"
                required
              ></ui5-textarea>
            </div>
          </div>
        </div>
      </section>
    </ui5-tab>
    <ui5-tab text="Attachments">
      <!-- Add content for the Attachments tab if needed -->
      <p>Attachments tab content goes here.</p>
    </ui5-tab>
  </ui5-tabcontainer>
  <ui5-toolbar slot="footer">
    <ui5-toolbar-button
      design="Emphasized"
      [disabled]="loading"
      (click)="insertData()"
      text="Submit"
    ></ui5-toolbar-button>
    <ui5-toolbar-button
      design="Transparent"
      text="Close"
      (click)="closeDialog()"
    ></ui5-toolbar-button>
  </ui5-toolbar>
</ui5-dialog>

<app-toast-message
  [IsOpenToastAlert]="IsOpenToastAlert"
  [ToastType]="ToastType"
></app-toast-message>
